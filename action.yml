# action.yml
name: 'Intercept AI Contract Guard'
description: 'Adversarially fuzzes Pydantic schemas to catch Agentic AI hallucination vulnerabilities before production.'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  schema_file:
    description: 'Path to the Python file containing your Pydantic models (e.g., src/models.py)'
    required: true
  schema_name:
    description: 'The exact class name of the Pydantic model to fuzz'
    required: true
  intercept_api_key:
    description: 'Your Intercept Organization API Key'
    required: true
  llm_provider:
    description: 'The LLM to use for generation (gemini, openai, anthropic)'
    required: false
    default: 'gemini'
  llm_api_key:
    description: 'Your LLM Provider API Key (Requires billing enabled for external providers)'
    required: true
  backend_url:
    description: 'Intercept API Gateway URL (Override for self-hosting)'
    required: false
    # CRITICAL: Replace this default with your actual Render /api/v1/fuzz/run URL
    default: 'https://intercept-api-[YOUR-RENDER-ID].onrender.com/api/v1/fuzz/run'

runs:
  using: "composite"
  steps:
    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Intercept Dependencies
      run: pip install requests
      shell: bash

    - name: Execute Intercept Security Gate
      # github.action_path ensures the runner finds your script even when called from an external repository
      run: python ${{ github.action_path }}/action/main.py
      shell: bash
      env:
        SCHEMA_FILE: ${{ inputs.schema_file }}
        SCHEMA_NAME: ${{ inputs.schema_name }}
        API_KEY: ${{ inputs.intercept_api_key }}
        LLM_PROVIDER: ${{ inputs.llm_provider }}
        LLM_API_KEY: ${{ inputs.llm_api_key }}
        BACKEND_URL: ${{ inputs.backend_url }}